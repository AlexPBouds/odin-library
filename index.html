<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="stylesheet.css" />
    <title>Odin Library</title>
  </head>
  <body>
    <div class="library">
      <div class="titleContainer">
        <div class="spacer"></div>
        <p class="libraryTitle">Library</p>
        <button type="submit" class="newBookButton" onclick="openPopup()">
          New Book
        </button>
      </div>

      <div class="popup">
        <h2 id="popupTitle">Enter book details</h2>

        <label class="custom-field">
          <input type="text" id="bookTitle" required />
          <span class="placeholder">Book Title</span>
        </label>

        <label class="custom-field">
          <input type="text" id="bookAuthor" required />
          <span class="placeholder">Author</span>
        </label>

        <label class="custom-field">
          <input type="text" id="bookPages" required />
          <span class="placeholder">Pages</span>
        </label>

        <div class="checkboxContainer">
          <input type="checkbox" id="read" />
          <label for="read" class="readLabel">Read</label>
        </div>

        <div class="buttonContainer">
          <button type="button" onclick="submitBookData()">Add Book</button>
          <button type="button" onclick="closePopup()">Close</button>
        </div>
      </div>

      <div class="libraryContainer"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
